<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DART Sector Analyzer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>DART Sector Analyzer</h1>
          <p id="summaryLine">증권사 정기보고서 재무실적</p>
        </div>
        <div class="top-actions">
          <select id="exportFormatSelect" aria-label="내보내기 형식">
            <option value="csv">CSV</option>
            <option value="tsv">TSV</option>
            <option value="json">JSON</option>
            <option value="md">Markdown</option>
            <option value="xls">Excel</option>
            <option value="html">HTML</option>
          </select>
          <button id="exportButton" type="button" disabled>내보내기</button>
        </div>
      </header>

      <section class="control-surface" aria-label="조회 조건">
        <label>
          <span>섹터</span>
          <select id="sectorSelect"></select>
        </label>
        <label>
          <span>사업연도</span>
          <input id="yearsInput" value="2026" />
        </label>
        <label>
          <span>재무제표</span>
          <select id="fsDivSelect">
            <option value="CFS">CFS</option>
            <option value="OFS">OFS</option>
          </select>
        </label>
        <label>
          <span>처리 회사 수</span>
          <input id="limitInput" type="number" min="0" step="1" placeholder="전체" />
        </label>
        <label>
          <span>최근 일수</span>
          <input id="daysInput" type="number" min="1" max="3650" value="30" />
        </label>
      </section>

      <section class="option-row" aria-label="보고서 및 옵션">
        <label><input type="checkbox" name="report" value="q1" checked /> 1분기</label>
        <label><input type="checkbox" name="report" value="half" /> 반기</label>
        <label><input type="checkbox" name="report" value="q3" /> 3분기</label>
        <label><input type="checkbox" name="report" value="annual" /> 사업</label>
        <label><input id="fallbackOfsInput" type="checkbox" checked /> 연결 없으면 별도</label>
        <label><input id="xbrlFallbackInput" type="checkbox" checked /> XBRL 보완</label>
        <label><input id="finalOnlyInput" type="checkbox" checked /> 최종보고서</label>
        <button id="analyzeButton" type="button">분석 실행</button>
        <button id="filingsButton" type="button">공시 조회</button>
      </section>

      <section class="status-line" aria-live="polite">
        <span id="statusText">대기 중</span>
        <span id="warningText"></span>
      </section>

      <section id="chartPanel" class="chart-panel" aria-label="비교 그래프">
        <div class="chart-toolbar">
          <div>
            <h2>섹터 비교</h2>
            <p id="chartSubtitle">분석 결과가 나오면 회사별 지표를 비교합니다.</p>
          </div>
          <label>
            <span>비교 지표</span>
            <select id="chartMetricSelect">
              <option value="operating_income">영업이익</option>
              <option value="pretax_income">세전이익</option>
              <option value="net_income">당기순이익</option>
              <option value="operating_revenue">영업수익</option>
              <option value="equity">자본총계</option>
              <option value="operating_margin">영업이익률</option>
              <option value="roe">ROE</option>
              <option value="debt_ratio">부채비율</option>
            </select>
          </label>
        </div>
        <div id="chartBody" class="chart-body">
          <div class="empty-chart">데이터 없음</div>
        </div>
      </section>

      <section class="table-zone">
        <div class="table-tabs" role="tablist">
          <button class="tab is-active" type="button" data-view="analysis">재무 분석</button>
          <button class="tab" type="button" data-view="filings">공시 조회</button>
        </div>
        <div id="analysisView" class="table-view is-active">
          <table id="analysisTable"></table>
        </div>
        <div id="filingsView" class="table-view">
          <table id="filingsTable"></table>
        </div>
      </section>
    </main>

    <div id="pdfModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-pdf></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="pdfModalTitle">
        <header class="modal-header">
          <div>
            <h2 id="pdfModalTitle">원문 보고서</h2>
            <p id="pdfModalMeta"></p>
          </div>
          <div class="modal-actions">
            <button id="pdfDownloadButton" type="button">PDF 다운로드</button>
            <button id="pdfCloseButton" type="button" aria-label="닫기">닫기</button>
          </div>
        </header>
        <iframe id="pdfFrame" title="원문 PDF 뷰어"></iframe>
      </section>
    </div>

    <script type="module" src="/app.js?v=20260517-ui-tools"></script>
  </body>
</html>
